services:
  # 1. Express API Node Service
  - type: web
    name: speakeasy-api
    env: node
    plan: free # Can be upgraded to starter/pro
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma db push && npm run prisma:seed && npm start
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: speakeasy-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false # User enters manually in Render dashboard UI

databases:
  # 2. Production PostgreSQL Database
  - name: speakeasy-db
    plan: free
    postgresMajorVersion: 15
